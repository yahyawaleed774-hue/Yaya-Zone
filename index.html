<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAYA ZONE | ذكاء وليونة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-gradient: linear-gradient(145deg, #ff8800, #e67700);
            --orange-dark: #b35d00;
            --black: #0a0a0a;
            --card-bg: #161616;
            --soft-white: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* يحسن سرعة اللمس على الفون */
        }

        body {
            background-color: var(--black);
            color: var(--soft-white);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            transition: direction 0.3s ease;
            overflow-x: hidden; /* يمنع الاهتزاز الجانبي */
        }

        header {
            background-color: rgba(22, 22, 22, 0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff8800;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: sticky; /* يظل ثابت في الأعلى */
            top: 0;
            z-index: 1000;
            border-radius: 0 0 20px 20px;
        }

        .logo {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 900;
            color: #ff8800;
            text-shadow: 0 0 15px rgba(255, 136, 0, 0.3);
        }

        .lang-btn {
            background: #222;
            color: #ff8800;
            border: 1px solid #ff8800;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }

        .lang-btn:active {
            transform: scale(0.95);
            background: #ff8800;
            color: #000;
        }

        .hero {
            padding: 30px 15px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(22px, 8vw, 32px);
            font-weight: 900;
            margin: 0;
        }

        .hero h1 span { color: #ff8800; }

        .games-container {
            padding: 10px 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* عمودين في الموبايل */
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* تحسين للشاشات الصغيرة جداً */
        @media (max-width: 350px) {
            .games-container {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 768px) {
            .games-container { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 992px) {
            .games-container { grid-template-columns: repeat(4, 1fr); }
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }

        .game-thumb {
            width: 100%;
            aspect-ratio: 1 / 1; /* يخلي المربع متساوي الطول والعرض */
            background: #1f1f1f;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(30px, 10vw, 45px);
            margin-bottom: 12px;
        }

        .game-info {
            text-align: center;
        }

        .game-info h3 {
            font-size: 14px;
            margin: 0 0 12px 0;
            font-weight: 700;
            color: #fff;
            min-height: 35px;
            line-height: 1.3;
        }

        .play-btn {
            background: var(--orange-gradient);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
            padding: 12px 5px;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 0px var(--orange-dark);
            transition: 0.1s;
        }

        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0px var(--orange-dark);
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
            line-height: 1.8;
        }

        /* تحويل الاتجاه */
        html[lang="en"] { direction: ltr; }
    </style>
</head>
<body>

    <header>
        <div class="logo">YAYA ZONE</div>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">English</button>
    </header>

    <section class="hero">
        <h1 id="heroTitle">تحدي <span>الأذكياء</span></h1>
    </section>

    <main class="games-container">
        <!-- لعبة 1 -->
        <div class="game-card">
            <div class="game-thumb">🧮</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="تحدي الحساب السريع" data-en="Fast Math Challenge">تحدي الحساب السريع</h3>
                <a href="calc.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 2 -->
        <div class="game-card">
            <div class="game-thumb">➗</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="أكمل المعادلة الناقصة" data-en="Complete the Equation">أكمل المعادلة الناقصة</h3>
                <a href="equation.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 3 -->
        <div class="game-card">
            <div class="game-thumb">🔐</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="فك الشفرات" data-en="Decoder Challenge">فك الشفرات</h3>
                <a href="decode.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 4 -->
        <div class="game-card">
    <div class="game-thumb">🕒</div>
    <div class="game-info">
        <h3 class="g-title" data-ar="فكر بسرعة" data-en="Think Fast">فكر بسرعة</h3>
        <a href="Fast.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
    </div>
</div>


        <!-- soooooooooooooooooooon -->
        <div class="game-card">
            <div class="game-thumb">Y Z</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="قريباً " data-en="soon">قريباً</h3>
                <a href="soon.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

    </main>

    <footer>
        <span id="footerText">YAYA ZONE &copy; 2026<br>ألعاب ذكاء مصممة بدقة لتناسب هاتفك</span>
    </footer>

    <script>
        const translations = {
            ar: {
                hero: 'تحدي <span>الأذكياء</span>',
                langBtn: 'English',
                footer: 'YAYA ZONE &copy; 2026<br>ألعاب ذكاء مصممة بدقة لتناسب هاتفك'
            },
            en: {
                hero: '<span>Genius</span> Challenge',
                langBtn: 'العربية',
                footer: 'YAYA ZONE &copy; 2026<br>Precision Intelligence Games for Mobile'
            }
        };

        function toggleLanguage() {
            let currentLang = localStorage.getItem('yayaLang') || 'ar';
            let newLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('yayaLang', newLang);
            applyLanguage(newLang);
        }

        function applyLanguage(lang) {
            const html = document.getElementById('html-tag');
            const heroTitle = document.getElementById('heroTitle');
            const langBtn = document.getElementById('langBtn');
            const footerText = document.getElementById('footerText');

            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';

            heroTitle.innerHTML = translations[lang].hero;
            langBtn.innerText = translations[lang].langBtn;
            footerText.innerHTML = translations[lang].footer;

            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('yayaLang') || 'ar';
            applyLanguage(savedLang);
        };
    </script>
</body>
</html>
