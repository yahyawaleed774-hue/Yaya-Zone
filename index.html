<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAYA ZONE | ذكاء وليونة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-gradient: linear-gradient(145deg, #ff8800, #e67700);
            --orange-dark: #b35d00;
            --black: #0a0a0a;
            --card-bg: #161616;
            --soft-white: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--black);
            color: var(--soft-white);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            transition: direction 0.3s ease;
        }

        header {
            background-color: rgba(22, 22, 22, 0.9);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff8800;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 0 0 30px 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #ff8800;
            text-shadow: 0 0 15px rgba(255, 136, 0, 0.3);
            letter-spacing: 1px;
        }

        /* زر تغيير اللغة المطور */
        .lang-btn {
            background: #222;
            color: #ff8800;
            border: 1px solid #ff8800;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            box-shadow: 0 3px 0 #000;
        }

        .lang-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
        }

        .hero {
            padding: 40px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
        }

        .hero h1 span { color: #ff8800; }

        .games-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (min-width: 992px) {
            .games-container { grid-template-columns: repeat(4, 1fr); }
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 10px;
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-thumb {
            width: 100%;
            height: 100px;
            background: #1f1f1f;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-info {
            text-align: center;
            padding: 5px;
        }

        .game-info h3 {
            font-size: 15px;
            margin: 0 0 15px 0;
            font-weight: 700;
            color: #fff;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            background: var(--orange-gradient);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 15px;
            padding: 14px 0;
            display: block;
            border-radius: 18px;
            position: relative;
            box-shadow: 0 5px 0px var(--orange-dark);
            transition: all 0.1s ease;
        }

        .play-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px var(--orange-dark);
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            color: #444;
            font-size: 14px;
        }

        /* ستايل عند تغيير اللغة للإنجليزية */
        html[lang="en"] {
            direction: ltr;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">YAYA ZONE</div>
        <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">English</button>
    </header>

    <section class="hero">
        <h1 id="heroTitle">تحدي <span>الأذكياء</span></h1>
    </section>

    <main class="games-container">
        <!-- لعبة 1 -->
        <div class="game-card">
            <div class="game-thumb">🧮</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="تحدي الحساب السريع" data-en="Fast Math Challenge">تحدي الحساب السريع</h3>
                <a href="calc.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 2 -->
        <div class="game-card">
            <div class="game-thumb">➗</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="أكمل المعادلة الناقصة" data-en="Complete the Equation">أكمل المعادلة الناقصة</h3>
                <a href="equation.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 3 -->
        <div class="game-card">
            <div class="game-thumb">🔐</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="فك الشفرات" data-en="Decoder Challenge">فك الشفرات</h3>
                <a href="decode.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>

        <!-- لعبة 4 -->
        <div class="game-card">
            <div class="game-thumb">💡</div>
            <div class="game-info">
                <h3 class="g-title" data-ar="تحدي المنطق" data-en="Logic Challenge">تحدي المنطق</h3>
                <a href="logic.html" class="play-btn" data-ar="العب الآن" data-en="Play Now">العب الآن</a>
            </div>
        </div>
    </main>

    <footer>
        <span id="footerText">YAYA ZONE &copy; 2026 - ألعاب ذكاء مصممة بدقة</span>
    </footer>

    <script>
        // النصوص المترجمة
        const translations = {
            ar: {
                hero: 'تحدي <span>الأذكياء</span>',
                langBtn: 'English',
                footer: 'YAYA ZONE &copy; 2026 - ألعاب ذكاء مصممة بدقة'
            },
            en: {
                hero: '<span>Genius</span> Challenge',
                langBtn: 'العربية',
                footer: 'YAYA ZONE &copy; 2026 - Precision Intelligence Games'
            }
        };

        function toggleLanguage() {
            // التحقق من اللغة الحالية
            let currentLang = localStorage.getItem('yayaLang') || 'ar';
            let newLang = currentLang === 'ar' ? 'en' : 'ar';
            
            // حفظ اللغة الجديدة
            localStorage.setItem('yayaLang', newLang);
            
            // تطبيق اللغة
            applyLanguage(newLang);
        }

        function applyLanguage(lang) {
            const html = document.getElementById('html-tag');
            const heroTitle = document.getElementById('heroTitle');
            const langBtn = document.getElementById('langBtn');
            const footerText = document.getElementById('footerText');

            // تغيير الاتجاه واللغة في الوسم الرئيسي
            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';

            // تغيير النصوص العامة
            heroTitle.innerHTML = translations[lang].hero;
            langBtn.innerText = translations[lang].langBtn;
            footerText.innerHTML = translations[lang].footer;

            // تغيير نصوص الكروت (العناوين والأزرار)
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }

        // عند تحميل الصفحة، نتحقق من اللغة المحفوظة
        window.onload = () => {
            const savedLang = localStorage.getItem('yayaLang') || 'ar';
            applyLanguage(savedLang);
        };
    </script>
</body>
</html>
