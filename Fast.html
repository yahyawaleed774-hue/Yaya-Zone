    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff7b00;
            --orange-dark: #b35d00;
            --black: #0a0a0a;
            --card-bg: #161616;
            --green: #2ecc71;
            --red: #e74c3c;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .game-container {
            background: var(--card-bg);
            width: 92%;
            max-width: 360px;
            padding: 1.5rem 1.2rem;
            border-radius: 35px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .timer { color: var(--orange); }
        .score-display { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 10px; }

        .question-box {
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            font-weight: 700;
            margin: 1rem 0;
            color: #fff;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .choice-btn {
            color: #000;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }

        .btn-true { background: var(--green); box-shadow: 0 5px 0 #27ae60; }
        .btn-false { background: var(--red); box-shadow: 0 5px 0 #c0392b; }

        .choice-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }

        #game-over {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            border-radius: 33px; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }

        .retry-btn {
            background: var(--orange);
            color: #000;
            width: 80%;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 18px;
            box-shadow: 0 5px 0 var(--orange-dark);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .bottom-left-action {
            position: fixed; bottom: 12px; left: 12px;
            background: #1a1a1a; color: var(--orange);
            border: 1.5px solid var(--orange);
            padding: 8px 15px; border-radius: 10px;
            font-weight: 700; text-decoration: none; font-size: 0.8rem;
        }
        html[lang="en"] .bottom-left-action { left: auto; right: 12px; }
    </style>
</head>

        let score = 0;
        let time = 15;
        let timer;
        let currentQ;
        let usedQuestions = [];

        function getLang() {
            return localStorage.getItem('yayaLang') || 'ar';
        }

        function applyLanguage() {
            const lang = getLang();
            const html = document.getElementById('html-tag');
            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';

            const translations = {
                ar: { score: "النقاط:", instr: "فكر بسرعة.. حقيقة أم كذبة؟", t: "حقيقة", f: "كذبة", over: "خسرت!", final: "نقاطك:", retry: "إعادة المحاولة", home: "الرئيسية" },
                en: { score: "Score:", instr: "Think fast.. True or Lie?", t: "Truth", f: "Lie", over: "Game Over!", final: "Score:", retry: "Try Again", home: "Home" }
            };

            const t = translations[lang];
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('instruction').innerText = t.instr;
            document.getElementById('trueLabel').innerText = t.t;
            document.getElementById('falseLabel').innerText = t.f;
            document.getElementById('overTitle').innerText = t.over;
            document.getElementById('finalLabel').innerText = t.final;
            document.getElementById('retryBtn').innerText = t.retry;
            document.getElementById('homeBtn').innerText = t.home;
        }

        function generate() {
            const lang = getLang();
            const questions = database[lang];
            if (usedQuestions.length === questions.length) usedQuestions = [];
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * questions.length);
            } while (usedQuestions.includes(randomIndex));
            usedQuestions.push(randomIndex);
            currentQ = questions[randomIndex];
            document.getElementById('question').innerText = currentQ.q;
        }

        function runClock() {
            clearInterval(timer);
            time = 15;
            document.getElementById('time').innerText = time;
            timer = setInterval(() => {
                time--;
                document.getElementById('time').innerText = time;
                if (time <= 0) endGame();
            }, 1000);
        }

        function check(playerAnswer) {
            if (playerAnswer === currentQ.a) {
                score += 10;
                document.getElementById('score').innerText = score;
                generate();
                runClock();
            } else {
                endGame();
            }
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function start() {
            score = 0;
            usedQuestions = [];
            document.getElementById('score').innerText = 0;
            document.getElementById('game-over').style.display = 'none';
            applyLanguage();
            generate();
            runClock();
        }

        window.onload = start;
    </script>
