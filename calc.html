<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAYA ZONE | تحدي المئات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff7b00;
            --orange-dark: #b35d00;
            --black: #0a0a0a;
            --card-bg: #161616;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 10px;
        }

        /* تصغير المربع (الكونتينر) */
        .game-container {
            background: var(--card-bg);
            width: 92%;
            max-width: 360px; /* تم تصغيره من 440px */
            padding: 1.5rem 1.2rem; /* تقليل الحواف الداخلية */
            border-radius: 35px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 900;
            font-size: 0.95rem;
        }

        .timer { color: var(--orange); }
        .score-display { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 10px; }

        .question-box {
            font-size: clamp(1.6rem, 8vw, 2.4rem);
            font-weight: 900;
            margin: 1rem 0;
            color: var(--orange);
            direction: ltr;
            text-shadow: 0 0 15px rgba(255, 123, 0, 0.2);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* إخفاء الأسهم تماماً */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield; /* لمتصفح فايرفوكس */
            appearance  : textfield; /* لمتصفح فايرفوكس */
        }

        input {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            border-radius: 18px;
            padding: 12px;
            color: white;
            font-size: 1.8rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--orange); }

        .submit-btn {
            background: linear-gradient(145deg, #ff8800, #e67700);
            color: #000;
            width: 100%;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--orange-dark);
        }

        .submit-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--orange-dark);
        }

        .bottom-left-action {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: #1a1a1a;
            color: var(--orange);
            border: 1.5px solid var(--orange);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            z-index: 100;
        }

        .bottom-left-action:active {
            background: var(--orange);
            color: #000;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.98);
            border-radius: 33px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .wrong-anim { animation: shake 0.4s; border-color: #ff4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .correct-anim { animation: flash 0.4s; }
        @keyframes flash { 50% { background: #1a3a1a; } }

        @media (max-height: 550px) {
            .game-container { padding: 0.8rem; }
            .question-box { margin: 0.3rem 0; min-height: 50px; }
            .bottom-left-action { position: relative; bottom: 0; left: 0; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="game-card">
        <div class="header">
            <div class="score-display">النقاط: <span id="score">0</span></div>
            <div class="timer">⏳ <span id="time">20</span></div>
        </div>

        <div class="question-box" id="question">-- + --</div>

        <input type="number" id="answer" inputmode="numeric" placeholder="" autofocus>
        
        <button class="submit-btn" onclick="process()">إرسال</button>

        <div id="game-over">
            <h1 style="color: var(--orange); font-size: 1.8rem; margin-bottom: 5px;">انتهى الوقت!</h1>
            <p style="font-size: 1.2rem; margin-bottom: 20px;">نقاطك: <span id="final-score" style="color: #fff; font-weight: 900;">0</span></p>
            <button class="submit-btn" onclick="start()" style="width: 80%;">إعادة المحاولة</button>
        </div>
    </div>

    <button class="bottom-left-action" onclick="window.location.href='index.html'">
        الرئيسية
    </button>

    <script>
        let score = 0;
        let time = 20;
        let answer = 0;
        let timer;
        let pointsGain = 10;

        const qEl = document.getElementById('question');
        const iEl = document.getElementById('answer');
        const sEl = document.getElementById('score');
        const tEl = document.getElementById('time');
        const goEl = document.getElementById('game-over');
        const cEl = document.getElementById('game-card');

        function generate() {
            const level = Math.floor(score / 60);
            const isThreeNums = Math.random() < 0.20;
            const min = 10 + (level * 20);
            const max = 100 + (level * 150);

            if (!isThreeNums) {
                pointsGain = 10;
                const ops = ['+', '-', '×', '÷'];
                let op = ops[Math.floor(Math.random() * ops.length)];
                let n1, n2;

                if (op === '+') {
                    n1 = Math.floor(Math.random() * max) + min;
                    n2 = Math.floor(Math.random() * max) + min;
                    answer = n1 + n2;
                } else if (op === '-') {
                    n1 = Math.floor(Math.random() * max) + (max/2);
                    n2 = Math.floor(Math.random() * n1) + 1;
                    answer = n1 - n2;
                } else if (op === '×') {
                    n1 = Math.floor(Math.random() * (20 + level)) + 5;
                    n2 = Math.floor(Math.random() * 10) + 2;
                    answer = n1 * n2;
                } else {
                    let res = Math.floor(Math.random() * (20 + level)) + 2;
                    n2 = Math.floor(Math.random() * 20) + 2;
                    n1 = res * n2;
                    answer = res;
                    op = '÷';
                }
                qEl.innerText = `${n1} ${op} ${n2}`;
            } else {
                pointsGain = 20;
                const ops = ['+', '-', '×'];
                let op1 = ops[Math.floor(Math.random() * (level > 2 ? 3 : 2))];
                let op2 = ops[Math.floor(Math.random() * 2)];
                let n1, n2, n3, sub;
                n1 = Math.floor(Math.random() * (max/2)) + min;
                n2 = Math.floor(Math.random() * (max/4)) + 5;
                if (op1 === '+') sub = n1 + n2;
                else if (op1 === '-') { if(n1 < n2) [n1, n2] = [n2, n1]; sub = n1 - n2; }
                else { n1 = Math.floor(Math.random()*15)+2; n2 = Math.floor(Math.random()*5)+2; sub = n1*n2; op1 = '×';}
                n3 = Math.floor(Math.random() * (max/4)) + 5;
                if (op2 === '+') answer = sub + n3;
                else { if(sub < n3) [sub, n3] = [n3, sub]; answer = sub - n3; op2 = '-';}
                qEl.innerText = `${n1} ${op1} ${n2} ${op2} ${n3}`;
            }
            iEl.value = '';
            iEl.focus();
        }

        function runClock() {
            clearInterval(timer);
            time = Math.max(7, 20 - Math.floor(score / 100));
            tEl.innerText = time;
            timer = setInterval(() => {
                time--;
                tEl.innerText = time;
                if (time <= 0) {
                    clearInterval(timer);
                    document.getElementById('final-score').innerText = score;
                    goEl.style.display = 'flex';
                }
            }, 1000);
        }

        function process() {
            if (iEl.value === "") return;
            if (parseInt(iEl.value) === answer) {
                score += pointsGain;
                sEl.innerText = score;
                cEl.classList.add('correct-anim');
                setTimeout(() => cEl.classList.remove('correct-anim'), 400);
                generate();
                runClock();
            } else {
                iEl.classList.add('wrong-anim');
                setTimeout(() => iEl.classList.remove('wrong-anim'), 400);
                iEl.value = '';
            }
        }

        function start() {
            score = 0;
            sEl.innerText = 0;
            goEl.style.display = 'none';
            generate();
            runClock();
        }

        iEl.addEventListener('keyup', (e) => { if (e.key === 'Enter') process(); });
        window.onload = start;
    </script>
</body>
</html>
