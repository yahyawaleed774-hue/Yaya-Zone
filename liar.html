<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAYA ZONE | قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff7b00;
            --orange-dark: #b35d00;
            --black: #0a0a0a;
            --card-bg: #161616;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            transition: direction 0.3s;
        }

        /* تعديل الاتجاه عند اختيار الإنجليزية */
        html[lang="en"] body {
            direction: ltr;
        }

        .coming-soon-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 360px;
            padding: 3rem 1.5rem;
            border-radius: 35px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .icon-box {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            color: var(--orange);
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(255, 123, 0, 0.3);
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 80px;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid #333;
        }

        .progress-bar {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, var(--orange-dark), var(--orange));
            border-radius: 10px;
            animation: pulse-bar 2s infinite ease-in-out;
        }

        @keyframes pulse-bar {
            0% { opacity: 0.6; box-shadow: 0 0 5px var(--orange); }
            50% { opacity: 1; box-shadow: 0 0 15px var(--orange); }
            100% { opacity: 0.6; box-shadow: 0 0 5px var(--orange); }
        }

        .back-btn {
            background: var(--orange);
            background: linear-gradient(145deg, #ff8800, #e67700);
            color: #000;
            width: 100%;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--orange-dark);
            text-decoration: none;
            display: inline-block;
            transition: all 0.1s;
        }

        .back-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--orange-dark);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <div class="icon-box">🚀</div>
        
        <!-- النصوص مدعمة باللغتين -->
        <h1 id="title" data-ar="انتظرونا!" data-en="Stay Tuned!">انتظرونا!</h1>
        
        <p id="desc" 
           data-ar="استنّى تحديات جديدة هتكسّر دماغك وتختبر سرعتك في التفكير... قريب في YAYA ZONE!" 
           data-en="New challenges are coming to blow your mind and test your speed... soon in YAYA ZONE!">
           استنّى تحديات جديدة هتكسّر دماغك وتختبر سرعتك في التفكير... قريب في YAYA ZONE!
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <a href="index.html" class="back-btn" id="backBtn" data-ar="العودة للرئيسية" data-en="Back Home">العودة للرئيسية</a>

        <div class="footer-text" id="footerText" data-ar="قريباً جداً" data-en="COMING SOON">قريباً جداً | COMING SOON</div>
    </div>

    <script>
        function applyLanguage() {
            // جلب اللغة من المتصفح (الافتراضي عربية)
            const lang = localStorage.getItem('yayaLang') || 'ar';
            const html = document.getElementById('html-tag');

            // تحديث لغة واتجاه الصفحة
            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';

            // تحديث النصوص بناءً على العناصر التي تملك data-ar و data-en
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.onload = applyLanguage;
    </script>
</body>
</html>
